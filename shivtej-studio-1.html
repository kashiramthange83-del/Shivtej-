<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Shivtej Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  body{background:radial-gradient(ellipse at 25% 5%,#1e0040 0%,#04040f 55%,#001525 100%);min-height:100vh;font-family:'Rajdhani',sans-serif;color:#dde8ff;overflow-x:hidden}
  ::-webkit-scrollbar{width:3px;background:#08081a}
  ::-webkit-scrollbar-thumb{background:#2a1a5a;border-radius:2px}
  @keyframes glow-pulse{0%,100%{opacity:1;filter:brightness(1)}50%{opacity:0.85;filter:brightness(1.4)}}
  @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  @keyframes flicker{0%,96%,100%{opacity:1}97%{opacity:0.75}}
  @keyframes slide-up{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
  .glass{background:rgba(255,255,255,0.045);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.09);border-radius:20px}
  .wrap{max-width:500px;margin:0 auto;padding:18px 14px 90px}
  /* Sliders */
  input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer;width:100%;height:28px}
  input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:3px;background:rgba(255,255,255,0.1)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;margin-top:-9px;cursor:pointer;border:2px solid rgba(255,255,255,0.25);transition:transform 0.1s}
  input[type=range]:active::-webkit-slider-thumb{transform:scale(1.25)}
  .s-pink::-webkit-slider-thumb{background:#ff2d78;box-shadow:0 0 10px #ff2d78}
  .s-orange::-webkit-slider-thumb{background:#ff7c2d;box-shadow:0 0 10px #ff7c2d}
  .s-yellow::-webkit-slider-thumb{background:#f7f740;box-shadow:0 0 10px #f7f740}
  .s-green::-webkit-slider-thumb{background:#2dffa3;box-shadow:0 0 10px #2dffa3}
  .s-blue::-webkit-slider-thumb{background:#2dc8ff;box-shadow:0 0 10px #2dc8ff}
  .s-purple::-webkit-slider-thumb{background:#a855f7;box-shadow:0 0 12px #a855f7}
  .s-boost::-webkit-slider-thumb{background:#ff2d78;box-shadow:0 0 14px #ff2d78,0 0 30px #ff2d7840}
  /* Buttons */
  .abtn{border:1px solid rgba(255,255,255,0.11);background:rgba(255,255,255,0.05);color:#99aacc;border-radius:14px;padding:15px 12px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;letter-spacing:1px;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:6px;width:100%}
  .abtn:active{transform:scale(0.95);opacity:0.85}
  .abtn-primary{background:linear-gradient(135deg,rgba(168,85,247,0.25),rgba(44,200,255,0.15));border-color:rgba(168,85,247,0.45);color:#c084fc}
  .abtn-danger{border-color:rgba(255,70,70,0.4);color:#ff7777}
  .abtn-rec{border-color:#ff2d78;color:#ff2d78;animation:glow-pulse 1.2s infinite}
  /* Tabs */
  .tab-row{display:flex;gap:6px;padding:7px}
  .tab-btn{flex:1;padding:12px 4px;border:none;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;border-radius:12px;transition:all 0.22s;background:transparent;color:#44556688}
  .tab-btn.active{background:rgba(168,85,247,0.2);color:#c084fc;box-shadow:0 0 14px rgba(168,85,247,0.25)}
  /* FX toggle */
  .fx-row{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-radius:15px;cursor:pointer;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);transition:all 0.22s;margin-bottom:10px}
  .fx-row:active{transform:scale(0.98)}
  .toggle-track{width:46px;height:26px;border-radius:13px;position:relative;transition:background 0.25s;flex-shrink:0}
  .toggle-knob{position:absolute;top:4px;width:18px;height:18px;border-radius:9px;background:#fff;transition:left 0.22s;box-shadow:0 1px 4px rgba(0,0,0,0.4)}
  /* Preset */
  .preset-btn{padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#66778899;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1.5px;cursor:pointer;transition:all 0.2s;text-align:left;width:100%;display:block;margin-bottom:8px}
  .preset-btn:active{transform:scale(0.97)}
  .preset-btn.active{border-color:#a855f7;color:#c084fc;background:rgba(168,85,247,0.15);box-shadow:0 0 16px rgba(168,85,247,0.2)}
  /* Tabs content */
  .tab-content{display:none;animation:slide-up 0.3s ease}
  .tab-content.active{display:block}
  /* Header */
  .logo{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;letter-spacing:3px;line-height:1;background:linear-gradient(100deg,#ff2d78 0%,#a855f7 50%,#2dc8ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:flicker 12s infinite}
  .subtitle{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:4px;color:#3a4a88;margin-top:3px}
  /* Drop zone */
  .drop-zone{border:2px dashed rgba(255,255,255,0.13);border-radius:18px;padding:20px 16px;margin-bottom:14px;text-align:center;cursor:pointer;background:rgba(255,255,255,0.02);transition:all 0.22s}
  .drop-zone.drag{border-color:#a855f7;background:rgba(168,85,247,0.1)}
  .drop-zone.playing{border-color:rgba(44,200,255,0.35);background:rgba(44,200,255,0.04)}
  .drop-zone-icon{font-size:24px;margin-bottom:6px}
  .drop-zone-label{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:#445566;margin-bottom:4px}
  .drop-zone-sub{font-size:9px;color:#2a3a4a;letter-spacing:1px}
  /* Grid */
  .btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  /* Section label */
  .sec-label{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;color:#55668899;margin-bottom:16px}
  .eq-row{margin-bottom:18px}
  .eq-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .eq-name{display:flex;align-items:center;gap:8px}
  .eq-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .eq-label{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;transition:all 0.2s}
  .eq-freq{font-size:9px;color:#2a3a4a}
  .eq-val{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:600;min-width:52px;text-align:right;transition:all 0.2s}
  .footer{text-align:center;margin-top:28px;font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:3px;color:#141e2a}
  /* Status row */
  .status-row{display:flex;justify-content:space-between;align-items:center;font-size:8px;letter-spacing:2px;margin-top:8px}
  /* Volume/boost row */
  .ctrl-card{padding:16px;margin-bottom:12px}
  .ctrl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .ctrl-label{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px}
  .ctrl-val{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:6px">
    <div>
      <div class="logo">SHIVTEJ</div>
      <div class="subtitle">STUDIO · AUDIO ENGINE</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div id="bpm-display" style="display:none;text-align:center">
        <div id="bpm-val" style="font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;color:#2dffa3;text-shadow:0 0 14px #2dffa3;line-height:1"></div>
        <div style="font-size:7px;letter-spacing:2px;color:#1daa6360">BPM</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <div id="status-dot" style="width:9px;height:9px;border-radius:50%;background:#222233;transition:all 0.3s"></div>
        <div id="status-txt" style="font-size:7px;letter-spacing:1px;color:#222233">OFF</div>
      </div>
    </div>
  </div>

  <!-- VINYL + SPECTRUM -->
  <div class="glass" style="padding:16px;margin-bottom:14px">
    <div style="display:flex;gap:14px;align-items:center">
      <div style="flex-shrink:0;position:relative;width:88px;height:88px">
        <svg id="vinyl-svg" viewBox="0 0 90 90" width="88" height="88" style="transition:none">
          <circle cx="45" cy="45" r="43" fill="#090918" stroke="#1a0e38" stroke-width="2"/>
          <circle cx="45" cy="45" r="40" fill="none" stroke="rgba(120,60,200,0.22)" stroke-width="1"/>
          <circle cx="45" cy="45" r="34" fill="none" stroke="rgba(90,40,160,0.2)" stroke-width="1"/>
          <circle cx="45" cy="45" r="28" fill="none" stroke="rgba(60,30,140,0.18)" stroke-width="1"/>
          <circle cx="45" cy="45" r="22" fill="none" stroke="rgba(40,20,100,0.15)" stroke-width="1"/>
          <circle cx="45" cy="45" r="16" fill="none" stroke="rgba(20,10,80,0.15)" stroke-width="1"/>
          <circle cx="45" cy="45" r="10" fill="none" stroke="rgba(10,5,60,0.15)" stroke-width="1"/>
          <circle cx="45" cy="45" r="7" fill="#111125"/>
          <circle id="vinyl-center" cx="45" cy="45" r="3.5" fill="#2a2a44"/>
        </svg>
        <div id="vinyl-idle" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;letter-spacing:1px;color:#2a3344;pointer-events:none">IDLE</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:8px;min-width:0">
        <canvas id="canvas" width="280" height="82" style="border-radius:10px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.06);width:100%;height:82px;display:block"></canvas>
        <div class="status-row">
          <span id="live-label" style="color:#22334455;transition:color 0.3s">○ IDLE</span>
          <span id="mode-label" style="color:#33445566;font-size:8px">NO INPUT</span>
          <span id="rec-label" style="color:#ff2d78;font-family:'Orbitron',sans-serif;font-size:8px;display:none;animation:glow-pulse 0.9s infinite">⏺ REC</span>
        </div>
      </div>
    </div>
  </div>

  <!-- DROP ZONE -->
  <div class="drop-zone" id="drop-zone">
    <div class="drop-zone-icon">🎵</div>
    <div class="drop-zone-label" id="drop-label">TAP OR DROP AUDIO FILE</div>
    <div class="drop-zone-sub" id="drop-sub">MP3 · WAV · OGG · FLAC · AAC</div>
  </div>
  <input type="file" id="file-input" accept="audio/*" style="display:none"/>

  <!-- BUTTONS -->
  <div class="btn-grid" id="btn-grid-idle">
    <button class="abtn abtn-primary" onclick="startMic()">🎤 Microphone</button>
    <button class="abtn abtn-primary" onclick="document.getElementById('file-input').click()">📁 Load File</button>
  </div>
  <div class="btn-grid" id="btn-grid-playing" style="display:none">
    <button class="abtn abtn-danger" onclick="stopAudio()">■ Stop</button>
    <button class="abtn" id="rec-btn" onclick="toggleRecord()" style="border-color:rgba(255,45,120,0.4);color:#ff6699">⏺ Record</button>
  </div>

  <!-- VOLUME -->
  <div class="glass ctrl-card">
    <div class="ctrl-header">
      <span class="ctrl-label" style="color:#667799">MASTER VOLUME</span>
      <span class="ctrl-val" id="vol-val" style="color:#a855f7;text-shadow:0 0 12px #a855f7">80%</span>
    </div>
    <input type="range" class="s-purple" id="vol-slider" min="0" max="100" value="80" oninput="handleVolume(this.value)" style="background:linear-gradient(to right,#a855f7 80%,rgba(255,255,255,0.1) 0%)"/>
  </div>

  <!-- BASS BOOST -->
  <div class="glass ctrl-card" style="margin-top:12px;margin-bottom:14px">
    <div class="ctrl-header">
      <span class="ctrl-label" id="boost-label" style="color:#ff2d78">◈ BASS BOOST</span>
      <span class="ctrl-val" id="boost-val" style="color:#ff2d78;text-shadow:0 0 12px #ff2d78">OFF</span>
    </div>
    <input type="range" class="s-boost" id="boost-slider" min="0" max="15" step="0.5" value="0" oninput="handleBassBoost(this.value)" style="background:rgba(255,255,255,0.1)"/>
  </div>

  <!-- TABS -->
  <div class="glass tab-row" style="margin-bottom:14px">
    <button class="tab-btn active" onclick="switchTab('eq',this)">EQUALIZER</button>
    <button class="tab-btn" onclick="switchTab('fx',this)">FX RACK</button>
    <button class="tab-btn" onclick="switchTab('presets',this)">PRESETS</button>
  </div>

  <!-- EQ TAB -->
  <div class="glass tab-content active" id="tab-eq" style="padding:18px">
    <div class="sec-label">5-BAND PARAMETRIC EQ</div>
    <div id="eq-bands"></div>
  </div>

  <!-- FX TAB -->
  <div class="glass tab-content" id="tab-fx" style="padding:18px">
    <div class="sec-label">EFFECTS RACK</div>
    <div id="fx-rows"></div>
  </div>

  <!-- PRESETS TAB -->
  <div class="glass tab-content" id="tab-presets" style="padding:18px">
    <div class="sec-label">SOUND PRESETS</div>
    <div id="preset-btns"></div>
  </div>

  <div class="footer">SHIVTEJ STUDIO · REAL-TIME AUDIO ENGINE · WEB AUDIO API</div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const EQ_BANDS = [
  {label:"Bass",   freq:80,    type:"lowshelf",  color:"#ff2d78", cls:"s-pink"},
  {label:"Lo-Mid", freq:250,   type:"peaking",   color:"#ff7c2d", cls:"s-orange"},
  {label:"Mid",    freq:1000,  type:"peaking",   color:"#f7f740", cls:"s-yellow"},
  {label:"Hi-Mid", freq:4000,  type:"peaking",   color:"#2dffa3", cls:"s-green"},
  {label:"Treble", freq:12000, type:"highshelf", color:"#2dc8ff", cls:"s-blue"},
];
const EQ_KEYS = ["bass","lowMid","mid","highMid","treble"];
const PRESETS = {
  "Studio Clean":{bass:0,lowMid:0,mid:0,highMid:0,treble:0,bassBoost:0,volume:80},
  "Bass Heavy":  {bass:10,lowMid:6,mid:-2,highMid:-2,treble:0,bassBoost:8,volume:85},
  "Lo-Fi":       {bass:4,lowMid:2,mid:-4,highMid:-6,treble:-8,bassBoost:3,volume:75},
  "Vocal Boost": {bass:-2,lowMid:0,mid:6,highMid:5,treble:3,bassBoost:0,volume:80},
  "Deep Space":  {bass:8,lowMid:4,mid:-3,highMid:-5,treble:-3,bassBoost:10,volume:90},
};
const FX_LIST = [
  {key:"reverb",    label:"REVERB",  icon:"〜",color:"#a855f7",desc:"Space & depth"},
  {key:"delay",     label:"ECHO",    icon:"◎",color:"#2dc8ff",desc:"Rhythmic repeat"},
  {key:"distortion",label:"DISTORT",icon:"⚡",color:"#ff7c2d",desc:"Grit & overdrive"},
  {key:"flanger",   label:"FLANGER", icon:"∿",color:"#2dffa3",desc:"LFO jet sweep"},
];

// ── State ──────────────────────────────────────────────────────────────────
let audioCtx=null, sourceNode=null, analyser=null, gainNode=null;
let eqNodes=[], bassBoostNode=null;
let reverbRef=null, delayRef=null, distRef=null, flangerRef=null;
let mediaStream=null, recorder=null, recordChunks=[];
let isPlaying=false, isRecording=false;
let vinylAngle=0, vinylRaf=null, visRaf=null;
let eq={bass:0,lowMid:0,mid:0,highMid:0,treble:0};
let effects={reverb:false,delay:false,distortion:false,flanger:false};
let volume=0.8, bassBoost=0;
let activePreset=null;

// ── Helpers ─────────────────────────────────────────────────────────────────
function createImpulse(ctx,dur=2,dec=2){
  const sr=ctx.sampleRate,len=sr*dur,buf=ctx.createBuffer(2,len,sr);
  for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,dec);}
  return buf;
}
function distCurve(amt=50){
  const n=256,curve=new Float32Array(n),deg=Math.PI/180;
  for(let i=0;i<n;i++){const x=(i*2)/n-1;curve[i]=((3+amt)*x*20*deg)/(Math.PI+amt*Math.abs(x));}
  return curve;
}
function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)].join(",");}

// ── Build audio graph ────────────────────────────────────────────────────────
function buildGraph(ctx, src){
  analyser=ctx.createAnalyser();analyser.fftSize=2048;
  eqNodes=EQ_BANDS.map(b=>{const f=ctx.createBiquadFilter();f.type=b.type;f.frequency.value=b.freq;f.gain.value=0;f.Q.value=1;return f;});
  bassBoostNode=ctx.createBiquadFilter();bassBoostNode.type="lowshelf";bassBoostNode.frequency.value=120;bassBoostNode.gain.value=0;

  const reverb=ctx.createConvolver();reverb.buffer=createImpulse(ctx);
  const rDry=ctx.createGain();rDry.gain.value=1;const rWet=ctx.createGain();rWet.gain.value=0;
  reverbRef={node:reverb,wet:rWet,dry:rDry};

  const delay=ctx.createDelay(1.0);delay.delayTime.value=0.3;
  const dFb=ctx.createGain();dFb.gain.value=0.4;const dDry=ctx.createGain();dDry.gain.value=1;const dWet=ctx.createGain();dWet.gain.value=0;
  delayRef={node:delay,feedback:dFb,wet:dWet,dry:dDry};

  const dist=ctx.createWaveShaper();dist.curve=distCurve(50);dist.oversample="4x";
  const disDry=ctx.createGain();disDry.gain.value=1;const disWet=ctx.createGain();disWet.gain.value=0;
  distRef={node:dist,wet:disWet,dry:disDry};

  const flDelay=ctx.createDelay(0.02);flDelay.delayTime.value=0.005;
  const flOsc=ctx.createOscillator();flOsc.frequency.value=0.5;
  const flDepth=ctx.createGain();flDepth.gain.value=0;const flDry=ctx.createGain();flDry.gain.value=1;const flWet=ctx.createGain();flWet.gain.value=0;
  flOsc.connect(flDepth);flDepth.connect(flDelay.delayTime);flOsc.start();
  flangerRef={delay:flDelay,osc:flOsc,depth:flDepth,wet:flWet,dry:flDry};

  gainNode=ctx.createGain();gainNode.gain.value=volume;

  let n=src;
  eqNodes.forEach(f=>{n.connect(f);n=f;});
  n.connect(bassBoostNode);n=bassBoostNode;
  n.connect(rDry);n.connect(reverb);reverb.connect(rWet);
  const aR=ctx.createGain();aR.gain.value=1;rDry.connect(aR);rWet.connect(aR);n=aR;
  n.connect(dDry);n.connect(delay);delay.connect(dFb);dFb.connect(delay);delay.connect(dWet);
  const aD=ctx.createGain();aD.gain.value=1;dDry.connect(aD);dWet.connect(aD);n=aD;
  n.connect(disDry);n.connect(dist);dist.connect(disWet);
  const aDi=ctx.createGain();aDi.gain.value=1;disDry.connect(aDi);disWet.connect(aDi);n=aDi;
  n.connect(flDry);n.connect(flDelay);flDelay.connect(flWet);
  const aF=ctx.createGain();aF.gain.value=1;flDry.connect(aF);flWet.connect(aF);n=aF;
  n.connect(gainNode);gainNode.connect(analyser);analyser.connect(ctx.destination);

  // Restore state
  gainNode.gain.value=volume;
  bassBoostNode.gain.value=bassBoost;
  EQ_KEYS.forEach((k,i)=>{eqNodes[i].gain.value=eq[k];});
  Object.keys(effects).forEach(k=>{
    if(effects[k]){
      const r={reverb:reverbRef,delay:delayRef,distortion:distRef,flanger:flangerRef}[k];
      if(r){r.wet.gain.value=0.6;r.dry.gain.value=0.5;}
      if(k==="flanger"&&r?.depth)r.depth.gain.value=0.003;
    }
  });
}

// ── Mic ──────────────────────────────────────────────────────────────────────
async function startMic(){
  try{
    if(audioCtx)audioCtx.close();
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaStream=stream;
    const src=audioCtx.createMediaStreamSource(stream);
    sourceNode=src;buildGraph(audioCtx,src);
    setPlaying(true,"mic","MICROPHONE ACTIVE");
  }catch(e){alert("Microphone access denied or unavailable.");}
}

// ── File load ────────────────────────────────────────────────────────────────
async function loadFile(file){
  if(!file)return;
  if(audioCtx)audioCtx.close();
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const ab=await file.arrayBuffer();
  const decoded=await audioCtx.decodeAudioData(ab);
  const src=audioCtx.createBufferSource();src.buffer=decoded;src.loop=true;
  sourceNode=src;buildGraph(audioCtx,src);src.start(0);
  const name=file.name;
  setPlaying(true,"file",name.length>28?name.slice(0,28)+"…":name);
  estimateBpm(decoded);
}

function setPlaying(playing, mode, label){
  isPlaying=playing;
  document.getElementById("btn-grid-idle").style.display=playing?"none":"grid";
  document.getElementById("btn-grid-playing").style.display=playing?"grid":"none";
  const dot=document.getElementById("status-dot");
  const txt=document.getElementById("status-txt");
  const live=document.getElementById("live-label");
  const modeLbl=document.getElementById("mode-label");
  const dropZone=document.getElementById("drop-zone");
  const dropLabel=document.getElementById("drop-label");
  const dropSub=document.getElementById("drop-sub");
  const vinylIdle=document.getElementById("vinyl-idle");
  const vinylCenter=document.getElementById("vinyl-center");
  if(playing){
    dot.style.background="#2dffa3";dot.style.boxShadow="0 0 10px #2dffa3";txt.style.color="#2dffa360";txt.textContent="ON";
    live.style.color="#2dffa3";live.textContent="● LIVE";
    modeLbl.textContent=mode.toUpperCase();
    dropZone.className="drop-zone playing";dropLabel.textContent=label;dropSub.textContent="";
    vinylIdle.style.display="none";
    vinylCenter.setAttribute("fill","#a855f7");vinylCenter.style.filter="drop-shadow(0 0 6px #a855f7)";
    document.getElementById("vinyl-svg").style.filter="drop-shadow(0 0 12px rgba(168,85,247,0.7))";
    startVinyl();startVisualizer();
  }else{
    dot.style.background="#222233";dot.style.boxShadow="none";txt.style.color="#222233";txt.textContent="OFF";
    live.style.color="#22334455";live.textContent="○ IDLE";
    modeLbl.textContent="NO INPUT";
    dropZone.className="drop-zone";dropLabel.textContent="TAP OR DROP AUDIO FILE";dropSub.textContent="MP3 · WAV · OGG · FLAC · AAC";
    vinylIdle.style.display="flex";
    vinylCenter.setAttribute("fill","#2a2a44");vinylCenter.style.filter="none";
    document.getElementById("vinyl-svg").style.filter="none";
    cancelAnimationFrame(vinylRaf);cancelAnimationFrame(visRaf);
    const c=document.getElementById("canvas");c.getContext("2d").clearRect(0,0,c.width,c.height);
    document.getElementById("bpm-display").style.display="none";
    document.getElementById("rec-label").style.display="none";
  }
}

function stopAudio(){
  try{sourceNode?.stop?.();}catch(e){}
  sourceNode?.disconnect?.();
  mediaStream?.getTracks().forEach(t=>t.stop());
  audioCtx?.close();
  audioCtx=null;sourceNode=null;
  if(isRecording){recorder?.stop();setRecording(false);}
  setPlaying(false);
}

// ── BPM ─────────────────────────────────────────────────────────────────────
function estimateBpm(ab){
  const data=ab.getChannelData(0),sr=ab.sampleRate,chunk=data.slice(0,sr*2);
  let max=0,best=0;
  for(let lag=Math.floor(sr*60/200);lag<Math.floor(sr*60/60);lag+=4){
    let c=0;for(let i=0;i<1000;i++)c+=chunk[i]*(chunk[i+lag]||0);
    if(c>max){max=c;best=lag;}
  }
  const b=Math.round(sr*60/best);
  if(b>60&&b<200){
    const d=document.getElementById("bpm-display");
    document.getElementById("bpm-val").textContent=b;
    d.style.display="block";
    d.style.animation=`beat ${(60/b).toFixed(2)}s ease-in-out infinite`;
  }
}

// ── Vinyl ─────────────────────────────────────────────────────────────────────
function startVinyl(){
  cancelAnimationFrame(vinylRaf);
  const svg=document.getElementById("vinyl-svg");
  let a=0;
  function spin(){vinylRaf=requestAnimationFrame(spin);a+=0.4;svg.style.transform=`rotate(${a}deg)`;}
  spin();
}

// ── Visualizer ────────────────────────────────────────────────────────────────
function startVisualizer(){
  cancelAnimationFrame(visRaf);
  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");
  function draw(){
    visRaf=requestAnimationFrame(draw);
    if(!analyser)return;
    const W=canvas.width,H=canvas.height,buf=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(buf);
    ctx.fillStyle="rgba(4,4,18,0.4)";ctx.fillRect(0,0,W,H);
    const bw=(W/buf.length)*2.5;let x=0;
    for(let i=0;i<buf.length;i++){
      const v=buf[i]/255,bh=v*H*0.9,hue=(i/buf.length)*260+190;
      const g=ctx.createLinearGradient(0,H-bh,0,H);
      g.addColorStop(0,`hsla(${hue},100%,72%,0.95)`);g.addColorStop(1,`hsla(${hue+40},100%,28%,0.2)`);
      ctx.fillStyle=g;ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(x,H-bh,Math.max(1,bw-1),bh,[2,2,0,0]);
      else ctx.rect(x,H-bh,Math.max(1,bw-1),bh);
      ctx.fill();x+=bw+0.3;
    }
    analyser.getByteTimeDomainData(buf);
    ctx.beginPath();ctx.lineWidth=1.5;ctx.strokeStyle="rgba(160,210,255,0.2)";
    const sw=W/buf.length;let wx=0;
    for(let i=0;i<buf.length;i++){const vy=(buf[i]/128-1)*(H/5)+H/2;i===0?ctx.moveTo(wx,vy):ctx.lineTo(wx,vy);wx+=sw;}
    ctx.stroke();
  }
  draw();
}

// ── Volume ────────────────────────────────────────────────────────────────────
function handleVolume(v){
  volume=v/100;
  if(gainNode)gainNode.gain.value=volume;
  const pct=Math.round(v);
  document.getElementById("vol-val").textContent=pct+"%";
  document.getElementById("vol-slider").style.background=`linear-gradient(to right,#a855f7 ${v}%,rgba(255,255,255,0.1) 0%)`;
}

// ── Bass Boost ────────────────────────────────────────────────────────────────
function handleBassBoost(v){
  bassBoost=parseFloat(v);
  if(bassBoostNode)bassBoostNode.gain.value=bassBoost;
  document.getElementById("boost-val").textContent=bassBoost>0?`+${bassBoost}dB`:"OFF";
  const pct=(bassBoost/15)*100;
  document.getElementById("boost-slider").style.background=`linear-gradient(to right,#ff2d78 ${pct}%,rgba(255,255,255,0.1) 0%)`;
  document.getElementById("boost-label").style.textShadow=bassBoost>4?"0 0 8px #ff2d78":"none";
  document.getElementById("boost-val").style.animation=bassBoost>9?"glow-pulse 0.8s infinite":"none";
}

// ── EQ ────────────────────────────────────────────────────────────────────────
function handleEq(key,val){
  eq[key]=parseFloat(val);
  const idx=EQ_KEYS.indexOf(key);
  if(eqNodes[idx])eqNodes[idx].gain.value=eq[key];
  const band=EQ_BANDS[idx];
  const abs=Math.abs(eq[key]);
  document.getElementById(`eq-label-${key}`).style.color=abs>1?band.color:"#667788";
  document.getElementById(`eq-label-${key}`).style.textShadow=abs>1?`0 0 8px ${band.color}`:"none";
  document.getElementById(`eq-val-${key}`).style.color=abs>0.3?band.color:"#33445566";
  document.getElementById(`eq-val-${key}`).style.textShadow=abs>0.3?`0 0 8px ${band.color}`:"none";
  const v=eq[key];document.getElementById(`eq-val-${key}`).textContent=v>0?`+${v}`:v===0?"0":v;
  document.getElementById(`eq-slider-${key}`).style.background=`linear-gradient(to right,${band.color} ${((eq[key]+15)/30)*100}%,rgba(255,255,255,0.08) 0%)`;
}

// ── Effects ───────────────────────────────────────────────────────────────────
function toggleEffect(key){
  effects[key]=!effects[key];const on=effects[key];
  const t=audioCtx?.currentTime||0;
  const refs={reverb:reverbRef,delay:delayRef,distortion:distRef,flanger:flangerRef};
  const r=refs[key];
  if(r){
    r.wet?.gain.setTargetAtTime(on?0.6:0,t,0.05);
    r.dry?.gain.setTargetAtTime(on?0.5:1,t,0.05);
  }
  if(key==="flanger"&&r?.depth)r.depth.gain.setTargetAtTime(on?0.003:0,t,0.05);
  updateFxUI(key);
}

function updateFxUI(key){
  const on=effects[key];
  const fx=FX_LIST.find(f=>f.key===key);
  const row=document.getElementById(`fx-row-${key}`);
  const icon=document.getElementById(`fx-icon-${key}`);
  const label=document.getElementById(`fx-label-${key}`);
  const track=document.getElementById(`fx-track-${key}`);
  const knob=document.getElementById(`fx-knob-${key}`);
  const rgb=hexRgb(fx.color);
  row.style.background=on?`rgba(${rgb},0.1)`:"rgba(255,255,255,0.03)";
  row.style.borderColor=on?fx.color+"55":"rgba(255,255,255,0.07)";
  row.style.boxShadow=on?`0 0 20px rgba(${rgb},0.15)`:"none";
  icon.style.color=on?fx.color:"#2a3344";icon.style.textShadow=on?`0 0 14px ${fx.color}`:"none";
  label.style.color=on?fx.color:"#55667788";
  track.style.background=on?fx.color:"rgba(255,255,255,0.1)";
  track.style.boxShadow=on?`0 0 14px rgba(${rgb},0.5)`:"none";
  knob.style.left=on?"24px":"4px";
}

// ── Presets ───────────────────────────────────────────────────────────────────
function applyPreset(name){
  activePreset=name;
  const p=PRESETS[name];
  handleVolume(p.volume);
  document.getElementById("vol-slider").value=p.volume;
  handleBassBoost(p.bassBoost);
  document.getElementById("boost-slider").value=p.bassBoost;
  EQ_KEYS.forEach(k=>{
    eq[k]=p[k];handleEq(k,p[k]);
    document.getElementById(`eq-slider-${k}`).value=p[k];
  });
  document.querySelectorAll(".preset-btn").forEach(btn=>{
    btn.classList.toggle("active",btn.dataset.name===name);
  });
}

// ── Recording ─────────────────────────────────────────────────────────────────
function toggleRecord(){
  if(!isRecording){
    const dest=audioCtx?.createMediaStreamDestination();if(!dest)return;
    gainNode?.connect(dest);
    recorder=new MediaRecorder(dest.stream);recordChunks=[];
    recorder.ondataavailable=e=>recordChunks.push(e.data);
    recorder.onstop=()=>{
      const blob=new Blob(recordChunks,{type:"audio/webm"});
      const url=URL.createObjectURL(blob);const a=document.createElement("a");
      a.href=url;a.download="shivtej-mix.webm";a.click();
    };
    recorder.start();setRecording(true);
  }else{recorder?.stop();setRecording(false);}
}
function setRecording(r){
  isRecording=r;
  const btn=document.getElementById("rec-btn");
  const lbl=document.getElementById("rec-label");
  if(r){btn.textContent="⏹ Stop Rec";btn.className="abtn abtn-rec";lbl.style.display="block";}
  else{btn.textContent="⏺ Record";btn.className="abtn";btn.style.borderColor="rgba(255,45,120,0.4)";btn.style.color="#ff6699";lbl.style.display="none";}
}

// ── Tab switch ─────────────────────────────────────────────────────────────────
function switchTab(name, btn){
  document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(el=>el.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  btn.classList.add("active");
}

// ── Drag & drop ───────────────────────────────────────────────────────────────
const dropZone=document.getElementById("drop-zone");
dropZone.addEventListener("click",()=>document.getElementById("file-input").click());
dropZone.addEventListener("dragover",e=>{e.preventDefault();dropZone.className="drop-zone drag";document.getElementById("drop-label").textContent="DROP TO LOAD";});
dropZone.addEventListener("dragleave",()=>{dropZone.className=isPlaying?"drop-zone playing":"drop-zone";});
dropZone.addEventListener("drop",e=>{
  e.preventDefault();dropZone.className=isPlaying?"drop-zone playing":"drop-zone";
  const f=e.dataTransfer.files[0];if(f&&f.type.startsWith("audio/"))loadFile(f);
});
document.getElementById("file-input").addEventListener("change",e=>{const f=e.target.files[0];if(f)loadFile(f);e.target.value="";});

// ── Touch drag support on mobile ───────────────────────────────────────────────
dropZone.addEventListener("touchstart",e=>{if(e.touches.length===1)dropZone.style.borderColor="#a855f7";});
dropZone.addEventListener("touchend",()=>{dropZone.style.borderColor="";});

// ── Build EQ UI ───────────────────────────────────────────────────────────────
const eqContainer=document.getElementById("eq-bands");
EQ_BANDS.forEach((band,i)=>{
  const key=EQ_KEYS[i];
  const freq=band.freq>=1000?`${band.freq/1000}kHz`:`${band.freq}Hz`;
  eqContainer.innerHTML+=`
    <div class="eq-row">
      <div class="eq-header">
        <div class="eq-name">
          <div class="eq-dot" style="background:${band.color};box-shadow:0 0 6px ${band.color}"></div>
          <span class="eq-label" id="eq-label-${key}" style="color:#667788">${band.label}</span>
          <span class="eq-freq">${freq}</span>
        </div>
        <span class="eq-val" id="eq-val-${key}" style="color:#33445566">0</span>
      </div>
      <input type="range" class="${band.cls}" id="eq-slider-${key}" min="-15" max="15" step="0.5" value="0"
        oninput="handleEq('${key}',this.value)"
        style="background:rgba(255,255,255,0.08)"/>
    </div>`;
});

// ── Build FX UI ───────────────────────────────────────────────────────────────
const fxContainer=document.getElementById("fx-rows");
FX_LIST.forEach(fx=>{
  fxContainer.innerHTML+=`
    <div class="fx-row" id="fx-row-${fx.key}" onclick="toggleEffect('${fx.key}')">
      <div style="display:flex;align-items:center;gap:14px">
        <span id="fx-icon-${fx.key}" style="font-size:24px;color:#2a3344;transition:all 0.25s;line-height:1">${fx.icon}</span>
        <div>
          <div class="eq-label" id="fx-label-${fx.key}" style="letter-spacing:2px;font-size:11px;color:#55667788;margin-bottom:2px">${fx.label}</div>
          <div style="font-size:10px;color:#33445566">${fx.desc}</div>
        </div>
      </div>
      <div class="toggle-track" id="fx-track-${fx.key}" style="background:rgba(255,255,255,0.1)">
        <div class="toggle-knob" id="fx-knob-${fx.key}" style="left:4px"></div>
      </div>
    </div>`;
});

// ── Build Presets UI ──────────────────────────────────────────────────────────
const presetContainer=document.getElementById("preset-btns");
Object.keys(PRESETS).forEach(name=>{
  presetContainer.innerHTML+=`<button class="preset-btn" data-name="${name}" onclick="applyPreset('${name}')">○  ${name}</button>`;
});
presetContainer.innerHTML+=`<button class="preset-btn" style="border-color:#1a2533;color:#2a3544;margin-top:4px" onclick="applyPreset('Studio Clean');document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'))">↺  Reset All</button>`;
</script>
